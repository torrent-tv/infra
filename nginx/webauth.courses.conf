server {
    listen 80;
    server_name webauth.courses;

    include /etc/nginx/conf.d/compression.common;

    root /var/www/static/torrent-tv/server;

    # Re-resolve Docker service hostnames every 10 s so nginx picks up new
    # container IPs after watchtower restarts a service.
    resolver 127.0.0.11 valid=10s;
    set $upstream http://server:8080;

    # Static files served directly by nginx.
    # Falls back to Node.js for anything not found on disk
    # (API routes, /vendor/, /health, /healthz).
    location / {
        try_files $uri $uri/ @node;
    }

    location /ws/ {
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 3600s;
    }

    location @node {
        proxy_pass $upstream;
        proxy_redirect off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
