volumes:
  torrent-tv-server-static:

services:
  server:
    image: ghcr.io/torrent-tv/server:latest
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      PORT: "8080"
    volumes:
      - torrent-tv-server-static:/app/public

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
      - torrent-tv-server-static:/var/www/static/torrent-tv/server:ro
    depends_on:
      - server